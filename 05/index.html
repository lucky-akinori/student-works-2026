<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>会計コース</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      background-color: #eef3f7;
      font-family:
        "Yu Gothic",
        "Meiryo",
        sans-serif;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      padding: 24px;
      text-align: center;
      background-color: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    img {
      display: block;
      width: 70%;
      height: auto;
      margin: 0 auto;
      border-radius: 10px;
    }

    .back-link {
      display: inline-block;
      margin-top: 24px;
      padding: 12px 24px;
      color: #ffffff;
      background-color: #24577a;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

    .back-link:hover {
      background-color: #173e59;
    }
  </style>
</head>

<body>

  <main class="container">
    <img src="../accounting-course.png" alt="自分ら、会計コースなんで！と話す5人の高校生">

    <a class="back-link" href="../index.html">作品一覧へ戻る</a>
  </main>

</body>

</html>
