    <style>
        body {
            font-family: sans-serif;

        h1 {
            color: #003366;
            border-bottom: 3px solid #003366;
            padding-bottom: 10px;
        }

        p {
            font-size: 18px;
        }

        ul {
            display: grid;
            grid-template-columns: repeat(4, 140px);
            gap: 14px;
            list-style: none;
            padding: 0;
        }

        a {
            display: block;
            padding: 14px 10px;
            text-align: center;
            text-decoration: none;
            background: #ffffff;
            border: 1px solid #cccccc;
            border-radius: 6px;
            color: #003366;
            font-size: 18px;
        }

        a:hover {
            background: #003366;
            color: #ffffff;
        }

        @media screen and (max-width: 700px) {
            body {
                margin: 20px;
            }

            ul {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
