<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>令和8年度 Webサイト作品集</title>
<style>
*{box-sizing:border-box;}
body{
margin:0;min-height:100vh;color:#25324a;
background:linear-gradient(135deg,#edf5ff 0%,#f8fbff 50%,#eef8f5 100%);
font-family:"Yu Gothic","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
}
header{
padding:55px 20px 90px;
color:#fff;
text-align:center;
background:linear-gradient(135deg,#073b6f,#176ba9);
}
header h1{margin:0 0 14px;font-size:clamp(32px,5vw,52px);letter-spacing:.08em;}
header p{margin:0;font-size:18px;letter-spacing:.06em;opacity:.9;}
main{
width:min(1200px,calc(100% - 32px));
margin:-52px auto 50px;
padding:42px;
background:rgba(255,255,255,.96);
border-radius:22px;
box-shadow:0 16px 42px rgba(20,58,95,.16);
}
.introduction{text-align:center;margin-bottom:34px;}
.introduction h2{margin:0 0 10px;color:#063b6f;font-size:30px;}
.introduction p{margin:0;color:#667085;font-size:17px;line-height:1.8;}
.works{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(185px,1fr));
gap:18px;
}
.works a{
position:relative;
display:flex;
align-items:center;
justify-content:center;
min-height:110px;
text-decoration:none;
font-size:23px;
font-weight:bold;
color:#064b85;
background:linear-gradient(145deg,#fff,#f5f9fd);
border:1px solid #d4e3f0;
border-radius:16px;
box-shadow:0 6px 16px rgba(22,73,115,.09), inset 0 1px 0 rgba(255,255,255,.85);
transition:transform .2s ease,box-shadow .2s ease,background .2s ease,color .2s ease;
overflow:hidden;
}
.works a::before{
content:"";
position:absolute;
top:0;left:0;
width:100%;
height:4px;
background:linear-gradient(90deg,#4aa3df,#63c6a8);
}
.works a:hover{
color:#fff;
background:linear-gradient(135deg,#0c5795,#1683ba);
box-shadow:0 12px 26px rgba(16,88,145,.22);
transform:translateY(-3px);
}
.works a:focus-visible{
outline:4px solid rgba(22,131,186,.35);
outline-offset:3px;
}
footer{
padding:0 20px 35px;
text-align:center;
color:#64748b;
font-size:14px;
}
@media(max-width:700px){
header{padding:40px 16px 72px;}
header p{font-size:15px;}
main{width:min(100% - 20px,1200px);margin-top:-38px;padding:28px 18px;border-radius:16px;}
.introduction h2{font-size:24px;}
.introduction p{font-size:15px;}
.works{grid-template-columns:repeat(2,1fr);gap:12px;}
.works a{min-height:82px;font-size:18px;border-radius:12px;}
}
@media(max-width:400px){
.works{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<header>
<h1>Webサイト作品集</h1>
<p>令和8年度　生徒作品ギャラリー</p>
</header>

<main>
<section class="introduction">
<h2>作品を選んでください</h2>
<p>それぞれのボタンから、生徒が制作したWebサイトをご覧いただけます。</p>
