<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>令和8年度 Webサイト作品集</title>

  <style>
    :root {
      --navy: #123f68;
      --blue: #2f6f9f;
      --light-blue: #eaf2f8;
      --border: #c8d9e6;
      --text: #25384a;
      --subtext: #647789;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        linear-gradient(135deg, #eef4f8 0%, #f8fafc 55%, #edf3f6 100%);
      font-family:
        "Yu Gothic",
        "Hiragino Kaku Gothic ProN",
        Meiryo,
        sans-serif;
    }

    .hero {
      padding: 52px 20px 105px;
      color: var(--white);
      text-align: center;
      background:
        linear-gradient(135deg, #123b60 0%, #286892 100%);
    }

    .hero-inner {
      width: min(1100px, 100%);
      margin: 0 auto;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(38px, 6vw, 66px);
      line-height: 1.2;
      letter-spacing: 0.07em;
      text-shadow: 0 3px 12px rgba(0, 0, 0, 0.18);
    }

    .hero h1 span {
      display: block;
      margin-bottom: 8px;
      font-size: 0.42em;
      font-weight: normal;
      letter-spacing: 0.14em;
      opacity: 0.9;
    }

    .subject {
      margin: 20px 0 0;
      font-size: clamp(18px, 3vw, 26px);
      font-weight: bold;
      letter-spacing: 0.12em;
    }

    main {
      width: min(1240px, calc(100% - 32px));
      margin: -62px auto 50px;
      padding: 44px;
      background-color: rgba(255, 255, 255, 0.97);
      border-radius: 24px;
      box-shadow: 0 16px 40px rgba(31, 67, 94, 0.18);
    }

    .intro {
      margin-bottom: 36px;
      text-align: center;
    }

    .intro h2 {
      margin: 0 0 14px;
      color: var(--navy);
      font-size: clamp(28px, 4vw, 38px);
      letter-spacing: 0.05em;
    }

    .intro h2::after {
      content: "";
      display: block;
      width: 78px;
      height: 4px;
      margin: 14px auto 0;
      background-color: var(--blue);
      border-radius: 999px;
    }

    .intro p {
      margin: 0;
      color: var(--subtext);
      font-size: 16px;
      line-height: 1.9;
    }

    .works {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 18px;
    }

    .works a {
      display: flex;
      min-height: 108px;
      align-items: center;
      justify-content: center;
      color: #174f79;
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 0.04em;
      text-decoration: none;
      background:
        linear-gradient(145deg, #ffffff 0%, #eef5fa 100%);
      border: 1px solid var(--border);
      border-top: 5px solid var(--blue);
      border-radius: 15px;
      box-shadow: 0 6px 16px rgba(34, 77, 108, 0.1);
      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease,
        color 0.2s ease,
        background 0.2s ease;
    }

    .works a:hover {
      color: var(--white);
      background:
        linear-gradient(135deg, #245f8b, #367dab);
      box-shadow: 0 11px 23px rgba(30, 82, 120, 0.24);
      transform: translateY(-5px);
    }

    .works a:focus-visible {
      outline: 4px solid rgba(47, 111, 159, 0.3);
      outline-offset: 4px;
    }

    footer {
      padding: 0 20px 36px;
      color: #607384;
      text-align: center;
      font-size: 14px;
      line-height: 1.8;
    }

    @media (max-width: 1100px) {
      .works {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    @media (max-width: 850px) {
      main {
        padding: 34px 26px;
      }

      .works {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 620px) {
      .hero {
        padding: 40px 16px 88px;
      }

      main {
        width: calc(100% - 20px);
        margin-top: -44px;
        padding: 28px 16px;
        border-radius: 18px;
      }

      .intro p {
        font-size: 15px;
      }

      .works {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .works a {
        min-height: 84px;
        font-size: 18px;
        border-top-width: 4px;
        border-radius: 12px;
      }
    }

    @media (max-width: 380px) {
      .works {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <header class="hero">
    <div class="hero-inner">
      <h1>
        <span>令和8年度</span>
        Webサイト作品集
      </h1>

        各ボタンをクリックして、作品をご覧ください。
      </p>
    </section>

      <a href="16/">作品16</a>

</body>

</html>
