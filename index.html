<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>令和8年度 Webサイト作品集</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family:
        "Yu Gothic",
        "Hiragino Kaku Gothic ProN",
        Meiryo,
        sans-serif;
      color: #25324a;
      background:
        linear-gradient(135deg, #edf5ff 0%, #f8fbff 50%, #eef8f5 100%);
      min-height: 100vh;
    }

    header {
      padding: 55px 20px 85px;
      color: white;
      text-align: center;
      background:
        linear-gradient(135deg, #063b6f, #1766a6);
    }

    header h1 {
      margin: 0 0 14px;
      font-size: clamp(30px, 5vw, 50px);
      letter-spacing: 0.08em;
    }

    header p {
      margin: 0;
      font-size: 17px;
      opacity: 0.9;
    }

    main {
      width: min(1100px, calc(100% - 32px));
      margin: -48px auto 50px;
      padding: 38px;
      background-color: rgba(255, 255, 255, 0.96);
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(20, 58, 95, 0.16);
    }

    .introduction {
      margin: 0 0 30px;
      text-align: center;
    }

    .introduction h2 {
      margin: 0 0 8px;
      color: #063b6f;
      font-size: 25px;
    }

    .introduction p {
      margin: 0;
      color: #667085;
    }

    .works {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(175px, 1fr));
      gap: 18px;
    }

    .works a {
      display: flex;
      min-height: 92px;
      align-items: center;
      justify-content: center;
      color: #064b85;
      font-size: 20px;
      font-weight: bold;
      text-decoration: none;
      background:
        linear-gradient(145deg, #ffffff, #f1f7fd);
      border: 1px solid #d5e4f1;
      border-radius: 14px;
      box-shadow: 0 5px 14px rgba(22, 73, 115, 0.08);
      transition:
        transform 0.2s,
        box-shadow 0.2s,
        color 0.2s,
        background 0.2s;
    }

    .works a:hover {
      color: white;
      background:
        linear-gradient(135deg, #0c5795, #1683ba);
      box-shadow: 0 10px 22px rgba(16, 88, 145, 0.25);
      transform: translateY(-4px);
    }

    .number {
      margin-right: 10px;
      color: #7698b5;
      font-size: 14px;
      font-weight: normal;
    }

    .works a:hover .number {
      color: #dcefff;
    }

    footer {
      padding: 0 20px 35px;
      color: #64748b;
      text-align: center;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      header {
        padding-top: 38px;
        padding-bottom: 70px;
      }

      main {
        margin-top: -38px;
        padding: 25px 18px;
      }

      .works {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .works a {
        min-height: 74px;
        font-size: 17px;
      }

      .number {
        display: none;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>Webサイト作品集</h1>
    <p>令和8年度　生徒作品ギャラリー</p>
  </header>

  <main>
    <section class="introduction">
      <h2>作品を選んでください</h2>
      <p>それぞれのボタンから、生徒が制作したWebサイトをご覧いただけます。</p>
    </section>
